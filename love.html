<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>You Said Yes ❤️</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh; /* change from height → min-height */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 40px 20px; /* 👈 adds breathing room */
        box-sizing: border-box;

        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        font-family: "Poppins", sans-serif;
        color: white;
        text-align: center;
        overflow-x: hidden; /* allow vertical growth */
        position: relative;
      }

      .heart {
        position: absolute;
        color: rgba(255, 255, 255, 0.7);
        font-size: 22px;
        animation: floatUp 5s linear infinite;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) scale(1.3);
          opacity: 0;
        }
      }

      .container {
        max-width: 600px;
        padding: 40px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 25px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        animation: fadeIn 1.5s ease-in-out;
      }

      h1 {
        font-family: "Great Vibes", cursive;
        font-size: 3.5rem;
        margin-bottom: 10px;
      }

      .typing {
        font-size: 1.4rem;
        margin-top: 20px;
        min-height: 60px;
      }

      .heart-beat {
        font-size: 2.5rem;
        margin-top: 20px;
        animation: beat 1s infinite;
      }

      @keyframes beat {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.3);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <script>
      for (let i = 0; i < 25; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 3 + Math.random() * 2 + "s";
        document.body.appendChild(heart);
      }
    </script>

    <div class="container">
      <h1>Yayy!! 💖</h1>
      <div class="typing" id="text"></div>
      <div class="heart-beat">❤️</div>
    </div>

    <script>
      const message =
        "Thane haan boli ne mharo dil ghano khush ho gayo...\nBas ek hi vaado... thare chehre ri muskaan kadey kam na hon du mhain 💖";
      const textEl = document.getElementById("text");
      let index = 0;

      function typeEffect() {
        if (index < message.length) {
          if (message.charAt(index) === "\n") {
            textEl.innerHTML += "<br>";
          } else {
            textEl.innerHTML += message.charAt(index);
          }
          index++;
          setTimeout(typeEffect, 40);
        }
      }

      typeEffect();
    </script>
  </body>
</html>
