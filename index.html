<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>For Someone Special ❤️</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        font-family: "Poppins", sans-serif;
        overflow: hidden;
        position: relative;
      }

      .heart {
        position: absolute;
        color: rgba(255, 255, 255, 0.6);
        font-size: 20px;
        animation: floatUp 6s linear infinite;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(100vh) scale(0.5);
          opacity: 0;
        }
        50% {
          opacity: 1;
        }
        100% {
          transform: translateY(-10vh) scale(1.2);
          opacity: 0;
        }
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.2);
        padding: 50px;
        border-radius: 25px;
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.25);
      }

      h1 {
        color: white;
        font-size: 3rem;
        margin-bottom: 15px;
        font-family: "Great Vibes", cursive;
      }

      p {
        color: white;
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .buttons {
        position: relative;
        height: 200px;
        width: 400px;
        margin: auto;
      }

      button {
        padding: 15px 35px;
        font-size: 1.2rem;
        border: none;
        border-radius: 40px;
        cursor: pointer;
      }

      #yesBtn {
        background: linear-gradient(45deg, #ff4d6d, #ff758c);
        color: white;
        position: absolute;
        left: 40px;
        top: 80px;
      }

      #noBtn {
        background: #6c757d;
        color: white;
        position: absolute;
        left: 250px;
        top: 80px;
      }
    </style>
  </head>
  <body>
    <script>
      for (let i = 0; i < 20; i++) {
        let heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = 3 + Math.random() * 3 + "s";
        document.body.appendChild(heart);
      }
    </script>

    <div class="container">
      <h1>Hey Beautiful 💖</h1>
      <p>I have something special to ask you...</p>
      <h1>Will you be my girlfriend?</h1>
      <div class="buttons" id="area">
        <button id="yesBtn" onclick="goToLovePage()">Yes 💘</button>
        <button id="noBtn">No 🙈</button>
      </div>
    </div>

    <script>
      const noBtn = document.getElementById("noBtn");
      const yesBtn = document.getElementById("yesBtn");
      const area = document.getElementById("area");

      function isOverlapping(x, y) {
        const yesRect = yesBtn.getBoundingClientRect();
        const btnWidth = noBtn.offsetWidth;
        const btnHeight = noBtn.offsetHeight;

        const areaRect = area.getBoundingClientRect();

        const newLeft = areaRect.left + x;
        const newTop = areaRect.top + y;

        return !(
          newLeft + btnWidth < yesRect.left ||
          newLeft > yesRect.right ||
          newTop + btnHeight < yesRect.top ||
          newTop > yesRect.bottom
        );
      }

      function moveButton() {
        const maxX = area.clientWidth - noBtn.offsetWidth;
        const maxY = area.clientHeight - noBtn.offsetHeight;

        let x,
          y,
          tries = 0;

        do {
          x = Math.random() * maxX;
          y = Math.random() * maxY;
          tries++;
        } while (isOverlapping(x, y) && tries < 20);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
      }

      noBtn.addEventListener("mouseenter", moveButton);

      document.addEventListener("mousemove", (e) => {
        const rect = noBtn.getBoundingClientRect();
        const distance = Math.hypot(
          e.clientX - (rect.left + rect.width / 2),
          e.clientY - (rect.top + rect.height / 2),
        );

        if (distance < 150) {
          moveButton();
        }
      });

      function goToLovePage() {
        window.location.href = "love.html";
      }
    </script>
  </body>
</html>
